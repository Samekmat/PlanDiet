{% extends 'base.html' %}
{% block title %}
    Macros
{% endblock %}
{% block content %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="calculate">
    </form>

    <h1>Results</h1>
    {% if bmr %}
        <p>Your BMR(basal metabolic rate) is {{ bmr }} kcal</p>
    {% endif %}
    {% if cpm %}
        <p>Your TMR(total metabolic rate is {{ cpm }} kcal/day</p>
    {% endif %}
{% endblock %}
