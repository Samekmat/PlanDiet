{% extends 'base.html' %}
{% block title %}
    Login page
{% endblock %}
{% block content %}
    <h1>Login</h1>
    {% if error %}
    <h3>{{ error }}</h3>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="login">

    </form>
    Register <a href="/register">new account</a>
{% endblock %}
